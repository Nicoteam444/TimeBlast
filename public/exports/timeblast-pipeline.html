<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBlast — Pipeline IA</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .tb-pipeline {
    width: 100%; max-width: 920px;
    margin: 0 auto;
    aspect-ratio: 640 / 480;
    display: block;
    /* Optionnel : fond marine pour matcher la version officielle */
    background: linear-gradient(180deg, #0b1d31 0%, #142d4c 55%, #195C82 100%);
    border-radius: 16px;
    padding: 24px;
    box-sizing: border-box;
  }
  .tb-pipeline svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<!-- ──────────────────────────────────────────────────────────────────────
     TimeBlast Pipeline IA — animation 100% SVG + SMIL, autonome
     Utilisation WordPress :
       1) Bloc « HTML personnalisé » → coller le contenu de <body>
       2) ou uploader timeblast-pipeline.svg dans /wp-content/uploads/
          puis : <img src="/wp-content/uploads/timeblast-pipeline.svg">
       3) ou en iframe pour isolation totale :
          <iframe src="/wp-content/uploads/timeblast-pipeline.html"
                  style="border:0;width:100%;max-width:920px;aspect-ratio:640/480"></iframe>
     ────────────────────────────────────────────────────────────────────── -->
<div class="tb-pipeline">
<object type="image/svg+xml" data="timeblast-pipeline.svg" style="width:100%;height:100%;border:0;">
  <img src="timeblast-pipeline.svg" alt="TimeBlast Pipeline IA"/>
</object>
</div>
</body>
</html>
