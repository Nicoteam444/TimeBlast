<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Clock circle -->
  <circle cx="20" cy="20" r="16" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Clock hands -->
  <line x1="20" y1="20" x2="20" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="28" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="2" fill="white"/>
</svg>
