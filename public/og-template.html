<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TimeBlast OG Template</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #0b1d31 0%, #142d4c 55%, #195C82 100%);
    color: #fff;
    position: relative;
    width: 1200px; height: 630px;
  }
  /* halo lumineux droite */
  .halo {
    position: absolute; right: -200px; top: -200px; width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(91,202,255,0.25) 0%, rgba(91,202,255,0) 60%);
    border-radius: 50%;
    pointer-events: none;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 56px 56px;
  }
  .wrap {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    padding: 64px 72px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top { display: flex; align-items: center; gap: 18px; }
  .logo {
    width: 56px; height: 56px;
    background: #fff; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
  }
  .logo svg { width: 36px; height: 36px; }
  .brand-name { font-size: 30px; font-weight: 800; letter-spacing: -.02em; }
  .brand-dot { color: #5BCAFF; }

  .main { display: flex; flex-direction: column; gap: 22px; max-width: 980px; }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 100px;
    background: rgba(91,202,255,.12);
    border: 1px solid rgba(91,202,255,.35);
    color: #5BCAFF;
    font-size: 14px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    width: fit-content;
  }
  h1 {
    font-size: 70px; line-height: 1.05; font-weight: 800; letter-spacing: -.025em;
  }
  h1 .accent {
    background: linear-gradient(90deg, #5BCAFF, #ffffff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p.lead {
    font-size: 24px; line-height: 1.45; color: rgba(255,255,255,.78);
    max-width: 880px;
  }

  .bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 24px;
  }
  .tags {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .tag {
    padding: 9px 18px; border-radius: 100px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.18);
    font-size: 18px; font-weight: 700; letter-spacing: .02em;
  }
  .url {
    font-size: 18px; font-weight: 700; color: rgba(255,255,255,.55); letter-spacing: .02em;
  }
</style>
</head>
<body>
  <div class="halo"></div>
