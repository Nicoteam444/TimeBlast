<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- TimeBlast — Monogramme TB
       T et B fusionnés dans un cercle bleu SRA
       Style épuré, moderne, tech premium -->
  <circle cx="100" cy="100" r="92" fill="#195C82"/>
  <!-- T — barre horizontale arrondie -->
  <rect x="52" y="52" width="96" height="15" rx="7.5" fill="#ffffff"/>
  <!-- T/B — fût vertical partagé -->
  <rect x="92" y="52" width="15" height="100" rx="7.5" fill="#ffffff"/>
  <!-- B — lobe supérieur -->
  <rect x="107" y="60" width="32" height="30" rx="15" fill="#ffffff"/>
  <!-- B — lobe inférieur (plus large) -->
  <rect x="107" y="98" width="38" height="34" rx="17" fill="#ffffff"/>
  <!-- Accent doré — énergie / IA -->
  <circle cx="64" cy="59" r="6" fill="#F8B35A"/>
</svg>
