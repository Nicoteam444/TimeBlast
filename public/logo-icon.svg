<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cercle extérieur -->
  <circle cx="100" cy="100" r="92" fill="#195C82"/>
  <!-- Forme intérieure : flux de données / onde stylisée
       Inspirée du logo Kolus — courbe organique en S inversé
       qui évoque le mouvement de données + l'éclair (blast) -->
  <path d="
    M 65 55
    C 65 55, 110 45, 130 65
    C 150 85, 100 95, 85 100
    C 60 108, 55 125, 80 140
    C 105 155, 140 140, 140 140
  " stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Petit cercle accent en haut = point de donnée / énergie -->
  <circle cx="132" cy="63" r="7" fill="#F8B35A"/>
</svg>
